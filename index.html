<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorado Live Music Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pine:    #1a3028;
    --forest:  #2d5040;
    --sage:    #4a7c65;
    --amber:   #e8943a;
    --gold:    #f2c14e;
    --slate:   #8fa8a0;
    --cream:   #f5f0e8;
    --paper:   #ede8de;
    --ink:     #1c1f1e;
    --mist:    #d0dbd7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--pine);
    color: var(--cream);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, #0e1f18 0%, var(--pine) 60%, #1e3a2a 100%);
    border-bottom: 2px solid var(--amber);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--cream);
  }
  .site-title span {
    color: var(--amber);
  }
  .site-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--slate);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }
  .stats-bar {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--gold);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 1300px;
    margin: 1.2rem auto 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: flex-end;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    flex: 1;
    min-width: 130px;
  }
  .control-group label {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--slate);
  }
  select, input[type=text], input[type=date] {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    padding: 0.45rem 0.65rem;
    width: 100%;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus, input:focus {
    outline: none;
    border-color: var(--amber);
  }
  select option { background: var(--pine); color: var(--cream); }

  .view-toggle {
    display: flex;
    gap: 0.35rem;
    align-self: flex-end;
  }
  .view-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    color: var(--slate);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0.4rem 0.7rem;
    transition: all 0.15s;
    line-height: 1;
  }
  .view-btn.active, .view-btn:hover {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--pine);
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--sage);
    border-radius: 4px;
    color: var(--slate);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    padding: 0.45rem 0.8rem;
    text-transform: uppercase;
    align-self: flex-end;
    transition: all 0.15s;
  }
  .reset-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ── MAIN CONTENT ── */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .result-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--slate);
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .result-count strong { color: var(--gold); }

  /* ── LIST VIEW ── */
  #list-view { display: flex; flex-direction: column; gap: 0; }

  .day-group {}
  .day-header {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    padding: 1rem 0 0.4rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
  }
  .day-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--slate);
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .event-card {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.3rem 1rem;
    padding: 0.75rem 0.9rem;
    margin-bottom: 0.35rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 3px solid transparent;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .event-card:hover {
    background: rgba(255,255,255,0.07);
    border-left-color: var(--amber);
    transform: translateX(2px);
  }
  .event-name {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.3;
  }
  .event-meta {
    font-size: 0.78rem;
    color: var(--slate);
    margin-top: 0.15rem;
  }
  .event-meta strong { color: var(--mist); font-weight: 500; }
  .event-artists {
    font-size: 0.72rem;
    color: var(--sage);
    margin-top: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 55vw;
  }
  .event-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.35rem;
    flex-shrink: 0;
  }
  .genre-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    justify-content: flex-end;
  }
  .genre-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    padding: 0.18rem 0.45rem;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .ticket-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--amber);
    text-decoration: none;
    letter-spacing: 0.05em;
    border: 1px solid var(--amber);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ticket-link:hover {
    background: var(--amber);
    color: var(--pine);
  }

  /* ── CALENDAR VIEW ── */
  #cal-view { display: none; }
  .cal-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .cal-nav-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    color: var(--cream);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.35rem 0.8rem;
    transition: all 0.15s;
  }
  .cal-nav-btn:hover { background: var(--amber); border-color: var(--amber); color: var(--pine); }
  .cal-month-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    flex: 1;
    text-align: center;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-dow {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--slate);
    text-align: center;
    padding: 0.4rem 0;
    text-transform: uppercase;
  }
  .cal-day {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    min-height: 80px;
    padding: 0.4rem;
    vertical-align: top;
    cursor: default;
  }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.today { border-color: var(--amber); }
  .cal-day-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--slate);
    display: block;
    margin-bottom: 0.3rem;
  }
  .cal-day.today .cal-day-num { color: var(--amber); font-weight: 700; }
  .cal-event-pill {
    font-size: 0.66rem;
    padding: 0.18rem 0.35rem;
    border-radius: 2px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    display: block;
    text-decoration: none;
    color: var(--pine);
    font-weight: 600;
    transition: opacity 0.1s;
  }
  .cal-event-pill:hover { opacity: 0.8; }
  .cal-more {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--slate);
    cursor: pointer;
    padding: 0.1rem 0;
  }
  .cal-more:hover { color: var(--amber); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,15,0.85);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1e3328;
    border: 1px solid var(--sage);
    border-top: 3px solid var(--amber);
    border-radius: 8px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 1.8rem;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1.2rem;
    background: none;
    border: none;
    color: var(--slate);
    cursor: pointer;
    font-size: 1.4rem;
    line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--cream); }
  .modal-genre-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.4rem;
    color: var(--cream);
  }
  .modal-venue {
    font-size: 0.88rem;
    color: var(--mist);
    margin-bottom: 0.2rem;
  }
  .modal-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }
  .modal-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 0.3rem;
  }
  .modal-artists {
    font-size: 0.85rem;
    color: var(--mist);
    line-height: 1.6;
    margin-bottom: 1.2rem;
  }
  .modal-actions {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-top: 1.2rem;
  }
  .modal-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.55rem 1.1rem;
    border-radius: 4px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .modal-btn.primary {
    background: var(--amber);
    color: var(--pine);
    font-weight: 700;
  }
  .modal-btn.primary:hover { background: var(--gold); }
  .modal-btn.secondary {
    background: transparent;
    border: 1px solid var(--sage);
    color: var(--mist);
  }
  .modal-btn.secondary:hover { border-color: var(--amber); color: var(--amber); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--slate);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  /* ── LOAD MORE ── */
  .load-more-btn {
    display: block;
    margin: 2rem auto 0;
    background: transparent;
    border: 1px solid var(--sage);
    border-radius: 4px;
    color: var(--slate);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.7rem 2rem;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .load-more-btn:hover { border-color: var(--amber); color: var(--amber); }

  @media (max-width: 640px) {
    .controls { flex-direction: column; }
    .control-group { min-width: 100%; }
    .event-card { grid-template-columns: 1fr; }
    .event-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    .cal-grid { font-size: 0.6rem; }
    .cal-day { min-height: 55px; padding: 0.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">Colorado <span>Live Music</span> Calendar</div>
    <div class="site-sub">Statewide · Powered by Jambase</div>
    <div class="stats-bar" id="stats-bar"></div>

    <div class="controls">
      <div class="control-group">
        <label>Search artist or event</label>
        <input type="text" id="search" placeholder="e.g. Phish, jazz festival…">
      </div>
      <div class="control-group" style="max-width:160px">
        <label>City</label>
        <select id="city-filter">
          <option value="">All cities</option>
        </select>
      </div>
      <div class="control-group" style="max-width:155px">
        <label>Genre</label>
        <select id="genre-filter">
          <option value="">All genres</option>
        </select>
      </div>
      <div class="control-group" style="max-width:130px">
        <label>From</label>
        <input type="date" id="date-from">
      </div>
      <div class="control-group" style="max-width:130px">
        <label>To</label>
        <input type="date" id="date-to">
      </div>
      <button class="reset-btn" onclick="resetFilters()">Reset</button>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-list" onclick="setView('list')" title="List view">☰</button>
        <button class="view-btn" id="btn-cal" onclick="setView('cal')" title="Calendar view">▦</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="result-count" id="result-count"></div>
  <div id="list-view"></div>
  <div id="cal-view">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">&#8592;</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calNext()">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <button class="load-more-btn" id="load-more" style="display:none" onclick="loadMore()">Load more shows</button>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-genre-tags" id="modal-genres"></div>
    <h2 id="modal-title"></h2>
    <div class="modal-venue" id="modal-venue"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-label">Artists on the bill</div>
    <div class="modal-artists" id="modal-artists"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

  });

  applyFilters();

// ── FILTER ──
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const city = document.getElementById('city-filter').value;
  const genre = document.getElementById('genre-filter').value;
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;

  filtered = ALL_EVENTS.filter(e => {
    const d = (e.date||'').slice(0,10);
    if (from && d < from) return false;
    if (to && d > to) return false;
    if (city && e.city !== city) return false;
    if (genre && !e.genres.split(',').map(g=>g.trim()).includes(genre)) return false;
    if (q) {
      const blob = (e.name+' '+e.headliner+' '+e.artists+' '+e.venue+' '+e.city).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const rc = document.getElementById('result-count');
  rc.innerHTML = '<strong>' + filtered.length + '</strong> shows match your filters' +
    (filtered.length !== ALL_EVENTS.length ? ' <span style="color:var(--slate)">of ' + ALL_EVENTS.length + ' total</span>' : '');

  if (currentView === 'list') renderList();
  else renderCal();
}

// ── LIST VIEW ──
function renderList() {
  visibleCount = PAGE_SIZE;
  const container = document.getElementById('list-view');
  container.innerHTML = '';
  appendListItems(container, 0, Math.min(PAGE_SIZE, filtered.length));
  document.getElementById('load-more').style.display =
    filtered.length > PAGE_SIZE ? 'block' : 'none';
}

function loadMore() {
  const container = document.getElementById('list-view');
  const start = visibleCount;
  visibleCount = Math.min(visibleCount + PAGE_SIZE, filtered.length);
  appendListItems(container, start, visibleCount);
  if (visibleCount >= filtered.length)
    document.getElementById('load-more').style.display = 'none';
}

function appendListItems(container, start, end) {
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎸</div><p>No shows match your filters.<br>Try widening the date range or clearing a filter.</p></div>';
    return;
  }
  let lastDay = '';
  let dayDiv = null;
  // Collect existing last day key
  const existingDayHeaders = container.querySelectorAll('.day-header');
  if (existingDayHeaders.length > 0) {
    lastDay = existingDayHeaders[existingDayHeaders.length-1].dataset.day;
    dayDiv = existingDayHeaders[existingDayHeaders.length-1].closest('.day-group');
  }

  for (let i = start; i < end; i++) {
    const e = filtered[i];
    const day = (e.date||'').slice(0,10);
    if (day !== lastDay) {
      const dg = document.createElement('div');
      dg.className = 'day-group';
      const dh = document.createElement('div');
      dh.className = 'day-header';
      dh.dataset.day = day;
      dh.innerHTML = formatDay(day) + '<span class="day-count">' + filtered.filter(x=>x.date.slice(0,10)===day).length + ' shows</span>';
      dg.appendChild(dh);
      container.appendChild(dg);
      dayDiv = dg;
      lastDay = day;
    }
    dayDiv.appendChild(buildCard(e));
  }
}

function formatDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
}

function buildCard(e) {
  const card = document.createElement('div');
  card.className = 'event-card';
  card.onclick = () => openModal(e);

  const genres = e.genres.split(',').map(g=>g.trim()).filter(Boolean);
  const primaryGenre = genres[0]||'';
  const [bg,] = genreColor(primaryGenre);
  card.style.borderLeftColor = bg;

  const artists = e.artists.split('|').map(a=>a.trim()).filter(Boolean);
  const artistPreview = artists.slice(0,4).join(' · ') + (artists.length>4?' · +more':'');

  card.innerHTML =
    '<div>' +
      '<div class="event-name">' + esc(e.name) + '</div>' +
      '<div class="event-meta"><strong>' + esc(e.venue) + '</strong> · ' + esc(e.city) + '</div>' +
      '<div class="event-artists">' + esc(artistPreview) + '</div>' +
    '</div>' +
    '<div class="event-right">' +
      '<div class="genre-tags">' + genres.slice(0,2).map(g => {
        const [bg,fg] = genreColor(g);
        return '<span class="genre-tag" style="background:'+bg+';color:'+lighten(fg)+'">'+esc(g)+'</span>';
      }).join('') + '</div>' +
      (e.tickets ? '<a class="ticket-link" href="'+esc(e.tickets)+'" target="_blank" onclick="event.stopPropagation()">Tickets ↗</a>' : '') +
    '</div>';
  return card;
}

// ── CALENDAR VIEW ──
function renderCal() {
  const label = new Date(calYear, calMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('cal-month-label').textContent = label;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day-of-week headers
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date().toISOString().slice(0,10);

  // Build day→events map
  const dayMap = {};
  filtered.forEach(e => {
    const d = (e.date||'').slice(0,10);
    if (!dayMap[d]) dayMap[d] = [];
    dayMap[d].push(e);
  });

  // Previous month padding
  for (let i = firstDay-1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.innerHTML = '<span class="cal-day-num">'+(prevDays-i)+'</span>';
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el = document.createElement('div');
    el.className = 'cal-day' + (dateStr===today?' today':'');
    const events = dayMap[dateStr]||[];
    let html = '<span class="cal-day-num">'+d+'</span>';
    const show3 = events.slice(0,3);
    show3.forEach(e => {
      const genres = e.genres.split(',').map(g=>g.trim());
      const [bg,] = genreColor(genres[0]||'');
      html += '<a class="cal-event-pill" style="background:'+bg+'" onclick="event.stopPropagation();openModal('+JSON.stringify(e).replace(/"/g,'&quot;')+')">'
        + esc(e.headliner||e.name) + '</a>';
    });
    if (events.length > 3) {
      html += '<div class="cal-more" onclick="showDayModal(dateStr,'+events.length+')">+' + (events.length-3) + ' more</div>';
    }
    el.innerHTML = html;
    grid.appendChild(el);
  }

  // Next month padding
  const totalCells = Math.ceil((firstDay + daysInMonth)/7)*7;
  let nd = 1;
  for (let i = firstDay+daysInMonth; i < totalCells; i++, nd++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.innerHTML = '<span class="cal-day-num">'+nd+'</span>';
    grid.appendChild(el);
  }

  document.getElementById('load-more').style.display = 'none';
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

// ── MODAL ──
function openModal(e) {
  const genres = e.genres.split(',').map(g=>g.trim()).filter(Boolean);
  document.getElementById('modal-genres').innerHTML = genres.map(g => {
    const [bg,] = genreColor(g);
    return '<span class="genre-tag" style="background:'+bg+';color:#f5f0e8">'+esc(g)+'</span>';
  }).join('');
  document.getElementById('modal-title').textContent = e.name;
  document.getElementById('modal-venue').textContent = '📍 ' + e.venue + ' · ' + e.city;
  const d = new Date((e.date||'')+'T12:00:00');
  document.getElementById('modal-date').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const artists = e.artists.split('|').map(a=>a.trim()).filter(Boolean);
  document.getElementById('modal-artists').textContent = artists.join('  ·  ');

  let actions = '';
  if (e.tickets) actions += '<a class="modal-btn primary" href="'+esc(e.tickets)+'" target="_blank">Get Tickets ↗</a>';
  if (e.url) actions += '<a class="modal-btn secondary" href="'+esc(e.url)+'" target="_blank">Jambase Details</a>';
  document.getElementById('modal-actions').innerHTML = actions;
  document.getElementById('modal-overlay').classList.add('open');
}

function showDayModal(dateStr, count) {
  const events = filtered.filter(e=>e.date.slice(0,10)===dateStr);
  const d = new Date(dateStr+'T12:00:00');
  document.getElementById('modal-genres').innerHTML = '';
  document.getElementById('modal-title').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) + ' — ' + events.length + ' shows';
  document.getElementById('modal-venue').textContent = '';
  document.getElementById('modal-date').textContent = '';
  document.getElementById('modal-artists').innerHTML = events.map(e =>
    '<div style="padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer" onclick="closeModalBtn();openModal('+JSON.stringify(e).replace(/"/g,'&quot;')+')">' +
      '<strong style="color:var(--cream)">' + esc(e.name) + '</strong><br>' +
      '<span style="font-size:0.8rem;color:var(--slate)">' + esc(e.venue) + ' · ' + esc(e.city) + '</span>' +
    '</div>'
  ).join('');
  document.getElementById('modal-actions').innerHTML = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(evt) {
  if (evt.target === document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── VIEW SWITCH ──
function setView(v) {
  currentView = v;
  document.getElementById('list-view').style.display = v==='list' ? 'flex' : 'none';
  document.getElementById('cal-view').style.display = v==='cal' ? 'block' : 'none';
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-cal').classList.toggle('active', v==='cal');
  if (v==='list') renderList();
  else renderCal();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('city-filter').value = '';
  document.getElementById('genre-filter').value = '';
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  applyFilters();
}

// ── HELPERS ──
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function lighten(hex) { return '#f5f0e8'; }
</script>
